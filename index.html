<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eneco's English Practice ⚽</title>
<style>
  :root{ --green:#EF0107; --green-dk:#9B0000; --grass:#fde8e8; --gold:#C4973B; --red:#9B0000; --ink:#1a1a1a; --muted:#6b7785; --line:#e8d5d5; --bg:#fff8f8; --card:#ffffff; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.55;}
  header{background:linear-gradient(135deg,#9B0000 0%,#EF0107 50%,#9B0000 100%);color:#fff;padding:28px 20px;text-align:center;position:relative;overflow:hidden;}
  .container{max-width:880px;margin:0 auto;padding:20px}
  .class-switcher{display:flex;gap:10px;margin:18px 0 0;justify-content:center}
  .class-btn{padding:10px 28px;border-radius:30px;border:2px solid #EF0107;font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:#9B0000;font-family:inherit;transition:all .18s}
  .class-btn.active{background:#EF0107;color:#fff;box-shadow:0 3px 10px rgba(239,1,7,.35)}
  .class-panel{display:none}
  .class-panel.active{display:block}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0;background:var(--card);padding:8px;border-radius:12px;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .tab{flex:1;min-width:140px;text-align:center;padding:11px 8px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;border:none;background:transparent;font-family:inherit}
  .tab.active{background:#EF0107;color:#fff;box-shadow:0 2px 8px rgba(239,1,7,.35)}
  .panel{display:none;animation:fadeIn .3s ease}
  .panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card h2{margin:0 0 8px;color:var(--green-dk);font-size:20px}
  .card .lead{color:var(--muted);font-size:14px;margin:0 0 16px}
  .btn{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
  .btn:hover{background:var(--green-dk)}
  .btn.ghost{background:transparent;color:var(--green-dk);border:1px solid var(--green)}
  .btn.small{padding:5px 10px;font-size:12px}
  
  /* Pronunciation Activity Styles */
  .pron-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0;}
  .scol{border-radius:10px;padding:12px;min-height:120px;cursor:pointer;border:2px solid var(--line);text-align:center;}
  .scol.tc{background:#f4fff7;border-color:#6b8f71;}
  .scol.dc{background:#f0f7ff;border-color:#5c7f91;}
  .scol.ic{background:#fffdf0;border-color:#C4973B;}
  .col-lbl{font-size:20px;font-weight:800;margin-bottom:10px;}
  .word-bank{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;padding:14px;background:#f1f5f9;border-radius:10px;min-height:60px;}
  .chip{background:#fff;border:1px solid #94a3b8;border-radius:20px;padding:6px 14px;font-weight:600;cursor:grab;}
  .drop-zone{min-height:80px;display:flex;flex-direction:column;gap:6px;}
</style>
</head>
<body>

<header>
  <h1>⚽ Eneco's English Practice</h1>
  <div class="class-switcher">
    <button class="class-btn active" onclick="switchClass('c1',this)">Class 1</button>
    <button class="class-btn" onclick="switchClass('c2',this)">Class 2</button>
  </div>
</header>

<div class="container">
  <div class="class-panel active" id="c1">
    <div class="tabs" id="tabs-c1">
      <button class="tab active" data-tab="p1">1. Translations</button>
      <button class="tab" data-tab="p6-pron">Pronunciation</button>
    </div>
    
    <div class="panel active" id="p1">
      <div class="card">
        <h2>Part 1 — Present Perfect Simple</h2>
        <div id="p1-questions"></div>
      </div>
    </div>

    <div class="panel" id="p6-pron">
      <div class="card">
        <h2>Part 6 — Pronunciation of "-ed"</h2>
        <p class="lead">Drag the words into the correct column (/t/, /d/, or /ɪd/).</p>
        <div class="word-bank" id="word-bank" ondrop="drop(event)" ondragover="allowDrop(event)">
          <div class="chip" draggable="true" ondragstart="drag(event)" id="w1">worked</div>
          <div class="chip" draggable="true" ondragstart="drag(event)" id="w2">played</div>
          <div class="chip" draggable="true" ondragstart="drag(event)" id="w3">wanted</div>
          <div class="chip" draggable="true" ondragstart="drag(event)" id="w4">needed</div>
          <div class="chip" draggable="true" ondragstart="drag(event)" id="w5">watched</div>
        </div>
        <div class="pron-grid">
          <div class="scol tc" ondrop="drop(event)" ondragover="allowDrop(event)"><div class="col-lbl">/t/</div><div class="drop-zone" id="t-zone"></div></div>
          <div class="scol dc" ondrop="drop(event)" ondragover="allowDrop(event)"><div class="col-lbl">/d/</div><div class="drop-zone" id="d-zone"></div></div>
          <div class="scol ic" ondrop="drop(event)" ondragover="allowDrop(event)"><div class="col-lbl">/ɪd/</div><div class="drop-zone" id="i-zone"></div></div>
        </div>
        <button class="btn" style="width:100%" onclick="checkPronunciation()">Check Pronunciation</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Drag and Drop Logic
  function allowDrop(ev) { ev.preventDefault(); }
  function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
  function drop(ev) {
    ev.preventDefault();
    const data = ev.dataTransfer.getData("text");
    const target = ev.target.closest('.scol, .word-bank');
    if (target) {
      const zone = target.querySelector('.drop-zone') || target;
      zone.appendChild(document.getElementById(data));
    }
  }

  function checkPronunciation() {
    const rules = { 't-zone': ['worked', 'watched'], 'd-zone': ['played'], 'i-zone': ['wanted', 'needed'] };
    Object.keys(rules).forEach(zoneId => {
      const zone = document.getElementById(zoneId);
      const chips = Array.from(zone.querySelectorAll('.chip')).map(c => c.textContent);
      const correct = rules[zoneId];
      const isCorrect = chips.length > 0 && chips.every(c => correct.includes(c));
      const scol = zone.closest('.scol');
      scol.style.borderColor = (chips.length === 0) ? 'var(--line)' : (isCorrect ? '#28a745' : '#dc3545');
    });
  }

  function switchClass(id, btn){
    document.querySelectorAll('.class-panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.class-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  // Navigation Logic
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      const parent = t.closest('.tabs');
      parent.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      const container = parent.parentElement;
      container.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.tab).classList.add('active');
    });
  });
</script>
</body>
</html>
