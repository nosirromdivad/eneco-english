<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eneco's English Hub ⚽</title>
<style>
  :root{ --green:#EF0107; --green-dk:#9B0000; --gold:#C4973B; --bg:#fff8f8; --card:#ffffff; --line:#e8d5d5; }
  body { font-family: sans-serif; background: var(--bg); padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .btn-nav { background: var(--green); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-right: 5px; }
  .btn-rondo { background: var(--gold); }
  .option { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--line); cursor: pointer; text-align: left; }
  .option:hover { background: #fde8e8; }
</style>
</head>
<body>
<div class="container">
    <h1>⚽ Eneco's English Hub</h1>
    <div class="card">
        <button class="btn-nav" onclick="renderContent('class1')">Class 1: Present Perfect & Terms</button>
        <button class="btn-nav" onclick="renderContent('class2')">Class 2: Practical Vocab</button>
        <button class="btn-nav btn-rondo" onclick="renderRondos()">🔄 Rondos (Review)</button>
    </div>
    <div id="display-area"></div>
</div>

<script>
// THIS DATA OBJECT INCLUDES YOUR ORIGINAL DATA PLUS THE NEW WORDS
const data = {
    class1: [
        { q: "He lived here since 2010.", options: ["has lived", "lived"], correct: "has lived", hint: "Spanish interference: Use Present Perfect for unfinished time." },
        { q: "I haven't ______ finished.", options: ["already", "yet"], correct: "yet", hint: "In negatives, use 'yet' at the end." }
    ],
    class2: [
        { q: "Time off for a father?", options: ["Paternity leave", "Holiday"], correct: "Paternity leave" },
        { q: "Muscle wasting term?", options: ["Atrophy", "Stiffness"], correct: "Atrophy" }
    ]
};

function speak(text) {
    setTimeout(() => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-GB'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }, 300);
}

function renderContent(key) {
    const area = document.getElementById('display-area');
    area.innerHTML = `<h2>${key.toUpperCase()}</h2>`;
    data[key].forEach(item => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `<p>${item.q} <button onclick="speak('${item.q}')">🔊</button></p>`;
        item.options.forEach(opt => {
            d.innerHTML += `<button class="option" onclick="check(this, '${opt}', '${item.correct}', '${item.hint}')">${opt}</button>`;
        });
        area.appendChild(d);
    });
}

function renderRondos() {
    const area = document.getElementById('display-area');
    area.innerHTML = `<h2>🔄 Rondos (Cumulative Review)</h2>`;
    const pool = [...data.class1, ...data.class2].sort(() => 0.5 - Math.random()).slice(0, 4);
    pool.forEach(item => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `<p>${item.q}</p>`;
        item.options.forEach(opt => d.innerHTML += `<button class="option" onclick="check(this, '${opt}', '${item.correct}')">${opt}</button>`);
        area.appendChild(d);
    });
    area.innerHTML += `<button class="btn-nav btn-rondo" onclick="renderRondos()">Shuffle Again</button>`;
}

function check(btn, choice, correct, hint) {
    if(choice === correct) { alert("Correct!"); btn.style.background = '#d4edda'; }
    else { alert("Hint: " + hint); btn.style.background = '#f8d7da'; }
}
</script>
</body>
</html>
